name: CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04  # 锁版本避免兼容问题（22.04 兼容 libasound2）
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 tesseract-ocr
      
      - name: Install deps
        run: npm ci
      
      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome
      
      - name: Lint
        run: echo "Lint check skipped"
      
      - name: Start MCP Server (SSE mode)
        run: |
          KORE_MCP_MODE=sse KORE_MCP_PORT=39391 node src/main/mcp/server.mjs &
          echo "Server PID: $!"
          sleep 5
      
      - name: Test MCP Health Endpoint
        run: |
          curl -f http://localhost:39391/health || (echo "Health check failed" && exit 1)
      
      - name: Test MCP Server Info (7 tools)
        run: |
          curl -f http://localhost:39391/ | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['name']=='kore-fingerprint MCP Server'; assert len(d['tools'])==7; print('✅ 7 tools verified:', d['tools'])"
      
      - name: Cleanup
        if: always()
        run: pkill -f 'server.mjs' || true
